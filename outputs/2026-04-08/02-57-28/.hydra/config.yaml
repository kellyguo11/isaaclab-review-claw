env:
  viewer:
    eye:
    - 7.5
    - 7.5
    - 7.5
    lookat:
    - 0.0
    - 0.0
    - 0.0
    cam_prim_path: /OmniverseKit_Persp
    resolution:
    - 1280
    - 720
    origin_type: world
    env_index: 0
    asset_name: null
    body_name: null
  sim:
    device: cuda:0
    dt: 0.008333333333333333
    gravity:
    - 0.0
    - 0.0
    - -9.81
    physics_prim_path: /physicsScene
    physics_material:
      func: isaaclab.sim.spawners.materials.physics_materials:spawn_rigid_body_material
      static_friction: 0.5
      dynamic_friction: 0.5
      restitution: 0.0
      friction_combine_mode: average
      restitution_combine_mode: average
      compliant_contact_stiffness: 0.0
      compliant_contact_damping: 0.0
    use_fabric: true
    render_interval: 2
    enable_scene_query_support: false
    physics:
      class_type: isaaclab_physx.physics.physx_manager:PhysxManager
      solver_type: 1
      solve_articulation_contact_last: false
      min_position_iteration_count: 1
      max_position_iteration_count: 255
      min_velocity_iteration_count: 0
      max_velocity_iteration_count: 255
      enable_scene_query_support: false
      enable_ccd: false
      enable_stabilization: false
      enable_external_forces_every_iteration: false
      enable_enhanced_determinism: false
      bounce_threshold_velocity: 0.5
      friction_offset_threshold: 0.04
      friction_correlation_distance: 0.025
      gpu_max_rigid_contact_count: 8388608
      gpu_max_rigid_patch_count: 163840
      gpu_found_lost_pairs_capacity: 2097152
      gpu_found_lost_aggregate_pairs_capacity: 33554432
      gpu_total_aggregate_pairs_capacity: 2097152
      gpu_collision_stack_size: 67108864
      gpu_heap_capacity: 67108864
      gpu_temp_buffer_capacity: 16777216
      gpu_max_num_partitions: 8
      gpu_max_soft_body_contacts: 1048576
      gpu_max_particle_contacts: 1048576
    render:
      enable_translucency: null
      enable_reflections: null
      enable_global_illumination: null
      antialiasing_mode: null
      enable_dlssg: null
      enable_dl_denoiser: null
      dlss_mode: null
      enable_direct_lighting: null
      samples_per_pixel: null
      enable_shadows: null
      enable_ambient_occlusion: null
      dome_light_upper_lower_strategy: null
      carb_settings: null
      rendering_mode: null
    create_stage_in_memory: false
    logging_level: WARNING
    save_logs_to_file: true
    log_dir: null
    visualizer_cfgs: []
  ui_window_class_type: isaaclab.envs.ui.base_env_window:BaseEnvWindow
  seed: null
  decimation: 2
  is_finite_horizon: false
  episode_length_s: 5.0
  scene:
    num_envs: 4096
    env_spacing: 4.0
    lazy_sensor_update: true
    replicate_physics: true
    filter_collisions: true
    clone_in_fabric: true
  events: null
  observation_space: '{"type": "python", "space": "Box", "value": 4}'
  num_observations: null
  state_space: '{"type": "python", "space": "Box", "value": 0}'
  num_states: null
  observation_noise_model: null
  action_space: '{"type": "python", "space": "Box", "value": 1}'
  num_actions: null
  action_noise_model: null
  rerender_on_reset: false
  num_rerenders_on_reset: 0
  wait_for_textures: true
  xr: null
  log_dir: null
  robot_cfg:
    class_type: isaaclab.assets.articulation.articulation:Articulation
    prim_path: /World/envs/env_.*/Robot
    spawn:
      func: isaaclab.sim.spawners.from_files.from_files:spawn_from_usd
      visible: true
      semantic_tags: null
      copy_from_source: true
      spawn_path: null
      mass_props: null
      deformable_props: null
      rigid_props:
        rigid_body_enabled: true
        kinematic_enabled: null
        disable_gravity: null
        linear_damping: null
        angular_damping: null
        max_linear_velocity: 1000.0
        max_angular_velocity: 1000.0
        max_depenetration_velocity: 100.0
        max_contact_impulse: null
        enable_gyroscopic_forces: true
        retain_accelerations: null
        solver_position_iteration_count: null
        solver_velocity_iteration_count: null
        sleep_threshold: null
        stabilization_threshold: null
      collision_props: null
      activate_contact_sensors: false
      scale: null
      articulation_props:
        articulation_enabled: null
        enabled_self_collisions: false
        solver_position_iteration_count: 4
        solver_velocity_iteration_count: 0
        sleep_threshold: 0.005
        stabilization_threshold: 0.001
        fix_root_link: null
      fixed_tendons_props: null
      spatial_tendons_props: null
      joint_drive_props: null
      visual_material_path: material
      visual_material: null
      usd_path: https://omniverse-content-staging.s3-us-west-2.amazonaws.com/Assets/Isaac/6.0/Isaac/IsaacLab/Robots/Classic/Cartpole/cartpole.usd
      variants: null
    init_state:
      pos:
      - 0.0
      - 0.0
      - 2.0
      rot:
      - 0.0
      - 0.0
      - 0.0
      - 1.0
      lin_vel:
      - 0.0
      - 0.0
      - 0.0
      ang_vel:
      - 0.0
      - 0.0
      - 0.0
      joint_pos:
        slider_to_cart: 0.0
        cart_to_pole: 0.0
      joint_vel:
        .*: 0.0
    collision_group: 0
    debug_vis: false
    articulation_root_prim_path: null
    soft_joint_pos_limit_factor: 1.0
    actuators:
      cart_actuator:
        class_type: isaaclab.actuators.actuator_pd:ImplicitActuator
        joint_names_expr:
        - slider_to_cart
        effort_limit: null
        velocity_limit: null
        effort_limit_sim: 400.0
        velocity_limit_sim: null
        stiffness: 0.0
        damping: 10.0
        armature: null
        friction: null
        dynamic_friction: null
        viscous_friction: null
      pole_actuator:
        class_type: isaaclab.actuators.actuator_pd:ImplicitActuator
        joint_names_expr:
        - cart_to_pole
        effort_limit: null
        velocity_limit: null
        effort_limit_sim: 400.0
        velocity_limit_sim: null
        stiffness: 0.0
        damping: 0.0
        armature: null
        friction: null
        dynamic_friction: null
        viscous_friction: null
    actuator_value_resolution_debug_print: false
  action_scale: 100.0
  cart_dof_name: slider_to_cart
  pole_dof_name: cart_to_pole
  max_cart_pos: 3.0
  initial_pole_angle_range:
  - -0.25
  - 0.25
  rew_scale_alive: 1.0
  rew_scale_terminated: -2.0
  rew_scale_pole_pos: -1.0
  rew_scale_cart_vel: -0.01
  rew_scale_pole_vel: -0.005
agent:
  seed: 42
  device: cuda:0
  num_steps_per_env: 16
  max_iterations: 150
  empirical_normalization: {}
  obs_groups: {}
  clip_actions: null
  check_for_nan: true
  save_interval: 50
  experiment_name: smoke_final3
  run_name: ''
  logger: tensorboard
  neptune_project: isaaclab
  wandb_project: isaaclab
  resume: false
  load_run: .*
  load_checkpoint: model_.*.pt
  class_name: OnPolicyRunner
  actor: {}
  critic: {}
  algorithm:
    class_name: PPO
    num_learning_epochs: 5
    num_mini_batches: 4
    learning_rate: 0.001
    schedule: adaptive
    gamma: 0.99
    lam: 0.95
    entropy_coef: 0.005
    desired_kl: 0.01
    max_grad_norm: 1.0
    optimizer: adam
    value_loss_coef: 1.0
    use_clipped_value_loss: true
    clip_param: 0.2
    normalize_advantage_per_mini_batch: false
    share_cnn_encoders: false
    rnd_cfg: null
    symmetry_cfg: null
  policy:
    class_name: ActorCritic
    init_noise_std: 1.0
    noise_std_type: scalar
    state_dependent_std: false
    actor_obs_normalization: false
    critic_obs_normalization: false
    actor_hidden_dims:
    - 32
    - 32
    critic_hidden_dims:
    - 32
    - 32
    activation: elu
